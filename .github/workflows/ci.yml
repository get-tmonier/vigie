name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Knip, Check, Typecheck, Test & Build
    runs-on: ubuntu-latest
    env:
      TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || github.event.before || 'HEAD~1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Knip (unused code)
        run: bun knip

      - name: Biome check (affected)
        run: bun turbo check --affected

      - name: Import conventions (affected)
        run: bun turbo check-imports --affected

      - name: Typecheck (affected)
        run: bun turbo typecheck --affected

      - name: Test (affected)
        run: bun turbo test --affected

      - name: Build (affected)
        run: bun turbo build --affected
