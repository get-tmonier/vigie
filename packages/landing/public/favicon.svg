<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AA3C"/>
      <stop offset="45%" stop-color="#C49A2B"/>
      <stop offset="100%" stop-color="#A67C1A"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="url(#brass)" stroke-width="2.5"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="url(#brass)" stroke-width="2"/>
  <!-- Hub -->
  <circle cx="32" cy="32" r="5.5" fill="url(#brass)"/>
  <!-- Top -->
  <line x1="32" y1="27" x2="32" y2="7" stroke="url(#brass)" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="32" cy="6" rx="2.2" ry="3" fill="url(#brass)"/>
  <!-- Top-right -->
  <line x1="36.6" y1="29.8" x2="51.3" y2="15.1" stroke="url(#brass)" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="52.6" cy="13.8" rx="2.2" ry="3" transform="rotate(45 52.6 13.8)" fill="url(#brass)"/>
  <!-- Right -->
  <line x1="37" y1="32" x2="57" y2="32" stroke="url(#brass)" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="58" cy="32" rx="2.2" ry="3" transform="rotate(90 58 32)" fill="url(#brass)"/>
  <!-- Bottom-right -->
  <line x1="36.6" y1="34.2" x2="51.3" y2="48.9" stroke="url(#brass)" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="52.6" cy="50.2" rx="2.2" ry="3" transform="rotate(135 52.6 50.2)" fill="url(#brass)"/>
  <!-- Bottom -->
  <line x1="32" y1="37" x2="32" y2="57" stroke="url(#brass)" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="32" cy="58" rx="2.2" ry="3" fill="url(#brass)"/>
  <!-- Bottom-left -->
  <line x1="27.4" y1="34.2" x2="12.7" y2="48.9" stroke="url(#brass)" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="11.4" cy="50.2" rx="2.2" ry="3" transform="rotate(45 11.4 50.2)" fill="url(#brass)"/>
  <!-- Left -->
  <line x1="27" y1="32" x2="7" y2="32" stroke="url(#brass)" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="6" cy="32" rx="2.2" ry="3" transform="rotate(90 6 32)" fill="url(#brass)"/>
  <!-- Top-left -->
  <line x1="27.4" y1="29.8" x2="12.7" y2="15.1" stroke="url(#brass)" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="11.4" cy="13.8" rx="2.2" ry="3" transform="rotate(135 11.4 13.8)" fill="url(#brass)"/>
</svg>
