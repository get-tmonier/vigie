<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="vigie-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ECFB0"/>
      <stop offset="100%" stop-color="#178A6A"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="url(#vigie-gradient)" stroke-width="2.5"/>
  <!-- Middle ring -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="url(#vigie-gradient)" stroke-width="1.5" opacity="0.7"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="8" fill="none" stroke="url(#vigie-gradient)" stroke-width="1" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3.5" fill="url(#vigie-gradient)"/>
  <!-- Ray 12h (top) -->
  <line x1="32" y1="8" x2="32" y2="2" stroke="url(#vigie-gradient)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ray 2h (upper right) -->
  <line x1="52.8" y1="20" x2="57.4" y2="16.4" stroke="url(#vigie-gradient)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ray 4h (lower right) -->
  <line x1="52.8" y1="44" x2="57.4" y2="47.6" stroke="url(#vigie-gradient)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
